<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1584px; height: 396px; overflow: hidden; background: #000; }

.banner {
  width: 1584px;
  height: 396px;
  background: #000;
  position: relative;
  font-family: 'Space Grotesk', -apple-system, sans-serif;
  overflow: hidden;
  display: flex;
  align-items: center;
}

.glow-orange {
  position: absolute;
  width: 600px; height: 600px;
  background: radial-gradient(circle, rgba(255,122,26,0.22) 0%, transparent 70%);
  top: -200px; right: 80px;
  pointer-events: none;
}

.glow-blue {
  position: absolute;
  width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(70,130,180,0.14) 0%, transparent 70%);
  bottom: -200px; left: 100px;
  pointer-events: none;
}

.glow-orange-2 {
  position: absolute;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(255,122,26,0.10) 0%, transparent 70%);
  bottom: -100px; right: 350px;
  pointer-events: none;
}

.noise {
  position: absolute;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  opacity: 0.35;
  pointer-events: none;
}

.lines {
  position: absolute;
  inset: 0;
  pointer-events: none;
}

.line {
  position: absolute;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,122,26,0.12), rgba(70,130,180,0.08), transparent);
}

.line-1 { top: 98px; left: 0; right: 0; }
.line-2 { top: 298px; left: 0; right: 0; }

.left {
  position: relative;
  z-index: 10;
  width: 520px;
  padding-left: 72px;
  flex-shrink: 0;
}

.logo-img {
  height: 60px;
  width: auto;
  margin-bottom: 20px;
}

.tagline {
  font-size: 11px;
  font-weight: 400;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
  margin-left: 2px;
}

.divider {
  position: absolute;
  left: 520px;
  top: 60px;
  bottom: 60px;
  width: 1px;
  background: linear-gradient(180deg, transparent, rgba(255,122,26,0.25), rgba(70,130,180,0.15), transparent);
  z-index: 10;
}

.right {
  position: relative;
  z-index: 10;
  flex: 1;
  padding-left: 72px;
  padding-right: 72px;
}

.person-name {
  font-size: 52px;
  font-weight: 700;
  color: #fff;
  letter-spacing: -1.5px;
  line-height: 1;
  margin-bottom: 10px;
}

.person-title {
  font-size: 12px;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 28px;
}

.person-email {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,122,26,0.08);
  border: 1px solid rgba(255,122,26,0.2);
  border-radius: 6px;
  padding: 8px 16px;
  font-size: 16px;
  font-weight: 500;
  color: #FF7A1A;
  letter-spacing: 0.2px;
}

.email-dot {
  width: 6px;
  height: 6px;
  background: #FF7A1A;
  border-radius: 50%;
  flex-shrink: 0;
  box-shadow: 0 0 8px rgba(255,122,26,0.6);
}

.person-site {
  margin-top: 14px;
  font-size: 13px;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.5px;
}

.corner-accent {
  position: absolute;
  bottom: 0; right: 0;
  width: 180px; height: 180px;
  background: conic-gradient(from 225deg, rgba(255,122,26,0.08), transparent 60%);
  pointer-events: none;
}
</style>
</head>
<body>
<div class="banner">
  <div class="glow-orange"></div>
  <div class="glow-blue"></div>
  <div class="glow-orange-2"></div>
  <div class="noise"></div>

  <div class="lines">
    <div class="line line-1"></div>
    <div class="line line-2"></div>
  </div>

  <div class="left">
    <img class="logo-img" src="cre8ve-logo.png" alt="Cre8ve">
    <div class="tagline">Intelligence Engineered</div>
  </div>

  <div class="divider"></div>

  <div class="right">
    <div class="person-name">Inza I</div>
    <div class="person-title">Co-Founder &amp; COO · Cre8ve AI Solutions</div>
    <div class="person-email">
      <span class="email-dot"></span>
      inza@cre8ve.xyz
    </div>
    <div class="person-site">cre8ve.xyz</div>
  </div>

  <div class="corner-accent"></div>
</div>
</body>
</html>
