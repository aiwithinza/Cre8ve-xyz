<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 1584px; height: 396px; overflow: hidden; background: #080808; }

.banner {
  width: 1584px;
  height: 396px;
  background: #080808;
  display: flex;
  align-items: center;
  position: relative;
  font-family: 'Space Grotesk', -apple-system, sans-serif;
  overflow: hidden;
}

.bg-glow-center {
  position: absolute;
  top: -80px; left: 50%; transform: translateX(-50%);
  width: 700px; height: 500px;
  background: radial-gradient(ellipse, rgba(255,122,26,0.10) 0%, transparent 70%);
  pointer-events: none;
}

.bg-glow-right {
  position: absolute;
  top: 0; right: 0;
  width: 500px; height: 400px;
  background: radial-gradient(ellipse at 100% 50%, rgba(70,130,180,0.08) 0%, transparent 60%);
  pointer-events: none;
}

.left-space {
  width: 330px;
  flex-shrink: 0;
}

.center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  z-index: 2;
}

.logo-img {
  height: 60px;
  width: auto;
  margin-bottom: 18px;
}

.tagline {
  font-size: 12px;
  font-weight: 400;
  letter-spacing: 5px;
  color: rgba(255,255,255,0.38);
  text-transform: uppercase;
}

.divider {
  width: 1px;
  height: 130px;
  background: linear-gradient(to bottom, transparent, rgba(255,122,26,0.45) 40%, rgba(255,122,26,0.45) 60%, transparent);
  flex-shrink: 0;
  position: relative;
  z-index: 2;
}

.right {
  width: 560px;
  padding: 0 52px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  position: relative;
  z-index: 2;
}

.name {
  font-size: 44px;
  font-weight: 700;
  color: #ffffff;
  letter-spacing: -1px;
  line-height: 1;
  margin-bottom: 8px;
}

.role {
  font-size: 13px;
  font-weight: 500;
  color: #FF7A1A;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  margin-bottom: 28px;
}

.contact-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
}

.contact-item svg {
  flex-shrink: 0;
  opacity: 0.55;
}

.contact-item span {
  font-size: 16px;
  color: rgba(255,255,255,0.72);
  font-weight: 400;
}

.contact-item span.em {
  color: rgba(255,255,255,0.90);
  font-weight: 500;
}
</style>
</head>
<body>
<div class="banner">
  <div class="bg-glow-center"></div>
  <div class="bg-glow-right"></div>

  <div class="left-space"></div>

  <div class="center">
    <img class="logo-img" src="cre8ve-logo.png" alt="Cre8ve">
    <div class="tagline">Intelligence Engineered</div>
  </div>

  <div class="divider"></div>

  <div class="right">
    <div class="name">Inza I</div>
    <div class="role">Co-Founder &amp; COO · Cre8ve AI Solutions</div>

    <div class="contact-item">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <rect x="1.5" y="3.5" width="15" height="11" rx="2" stroke="white" stroke-width="1.4"/>
        <path d="M1.5 6L9 10.5L16.5 6" stroke="white" stroke-width="1.4"/>
      </svg>
      <span class="em">inza@cre8ve.xyz</span>
    </div>

    <div class="contact-item">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <circle cx="9" cy="9" r="7" stroke="white" stroke-width="1.4"/>
        <ellipse cx="9" cy="9" rx="3" ry="7" stroke="white" stroke-width="1.4"/>
        <line x1="2" y1="9" x2="16" y2="9" stroke="white" stroke-width="1.4"/>
      </svg>
      <span>cre8ve.xyz</span>
    </div>
  </div>
</div>
</body>
</html>
