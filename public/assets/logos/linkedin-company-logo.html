<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 400px; height: 400px; overflow: hidden; background: #080808; }

.logo-wrap {
  width: 400px;
  height: 400px;
  background: #080808;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  position: relative;
  font-family: 'Space Grotesk', -apple-system, sans-serif;
  overflow: hidden;
}

.glow {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 320px; height: 320px;
  background: radial-gradient(ellipse, rgba(255,122,26,0.14) 0%, transparent 70%);
  pointer-events: none;
}

.logo-img {
  position: relative;
  z-index: 2;
  width: 240px;
  height: auto;
  margin-bottom: 16px;
}

.sub {
  position: relative;
  z-index: 2;
  font-size: 11px;
  font-weight: 400;
  color: rgba(255,255,255,0.35);
  letter-spacing: 4px;
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="logo-wrap">
  <div class="glow"></div>
  <img class="logo-img" src="cre8ve-logo.png" alt="Cre8ve">
  <div class="sub">AI Solutions</div>
</div>
</body>
</html>
